kind = "web"
previewPath = "/"
title = "Shiruho Anime"
version = "1.0.0"
id = "artifacts/anime-home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25431

[services.development]
run = "pnpm --filter @workspace/anime-home run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anime-home", "run", "build" ]
publicDir = "artifacts/anime-home/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25431"
BASE_PATH = "/"
